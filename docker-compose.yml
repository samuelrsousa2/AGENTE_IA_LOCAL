# ==========================================================================
# docker-compose.yml — Produção (VPS com GPU AMD/NVIDIA)
# Uso: docker compose up -d
# ==========================================================================
version: '3.8'

services:
  # ── IDE Agêntica ──────────────────────────────────────────────────────────
  ide:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ide-agente
    restart: unless-stopped
    ports:
      - "3000:3000"
      # Portas para projetos criados pelo agente
      - "3001-3020:3001-3020"
      - "4000-4010:4000-4010"
      - "5000-5010:5000-5010"
      - "8000-8010:8000-8010"
    volumes:
      - ./workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker
      - ide_logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3000
      - WORKSPACE_DIR=/workspace
      - OLLAMA_URL=http://ollama:11434
      - DOCKER_HOST=unix:///var/run/docker.sock
      - PROJECT_PORT_START=3001
      - PROJECT_PORT_END=3020
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ide-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ide.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.ide.entrypoints=websecure"
      - "traefik.http.routers.ide.tls.certresolver=letsencrypt"

  # ── Ollama (IA local) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ide-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
    networks:
      - ide-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # GPU NVIDIA — descomente se tiver NVIDIA na VPS:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

    # GPU AMD (ROCm) — descomente se tiver AMD na VPS:
    # devices:
    #   - /dev/kfd:/dev/kfd
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    # ipc: host

  # ── Nginx Proxy Reverso ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ide-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_certs:/etc/letsencrypt
    depends_on:
      - ide
    networks:
      - ide-network
    profiles:
      - production  # Só sobe com: docker compose --profile production up

volumes:
  ollama_data:
    driver: local
  ide_logs:
    driver: local
  nginx_certs:
    driver: local

networks:
  ide-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
